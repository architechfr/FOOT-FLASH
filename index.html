<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#04080a;--s1:#0b1a10;--s2:#112518;--s3:#162e1c;--g:#00E676;--g2:#00C853;--gw:rgba(0,230,118,.2);--am:#FFB300;--rd:#FF1744;--tx:#e0f2e9;--t2:#6a9e73;--r:14px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--tx);min-height:100dvh}
.app{max-width:480px;margin:0 auto;padding:0 12px 100px;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:.3}to{opacity:1}}

/* Header */
.hdr{padding:16px 0 10px;text-align:center}
.hdr h1{font-size:24px;font-weight:900;color:var(--g);letter-spacing:1px}
.hdr-sub{font-size:11px;color:var(--t2);margin-top:2px}
.my-team{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px;padding:8px 16px;background:var(--gw);border:1px solid rgba(0,230,118,.3);border-radius:99px;font-size:13px;font-weight:700;color:var(--g);width:fit-content;margin-left:auto;margin-right:auto;cursor:pointer}

/* Nav */
.nav{position:fixed;bottom:0;left:0;right:0;background:rgba(4,8,10,.95);backdrop-filter:blur(12px);border-top:1px solid var(--s3);display:flex;justify-content:center;z-index:100;padding:6px 0 env(safe-area-inset-bottom,8px)}
.nav-i{display:flex;max-width:480px;width:100%}
.nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;padding:8px 2px;min-height:48px;border:none;background:transparent;color:var(--t2);font-size:9px;font-weight:700;cursor:pointer;font-family:inherit}
.nav .on{color:var(--g)}
.nav .ic{font-size:18px}

/* Filters */
.filters{display:flex;gap:6px;margin:10px 0;overflow-x:auto;padding-bottom:4px}
.fil{padding:7px 14px;border-radius:99px;border:1px solid var(--s3);background:transparent;color:var(--t2);font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit}
.fil.on{background:var(--gw);border-color:var(--g);color:var(--g)}

/* Match card */
.mc{background:var(--s1);border-radius:var(--r);padding:14px;margin-bottom:8px;border:1px solid var(--s3);cursor:pointer}
.mc.live{border-color:var(--g);box-shadow:0 0 20px rgba(0,230,118,.15)}
.mc.soon{border-color:rgba(255,179,0,.3)}
.mc-status{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.mc-status .dot{width:8px;height:8px;border-radius:50%;animation:blink 1.2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.mc-teams{display:flex;align-items:center;justify-content:center;gap:12px}
.mc-team{text-align:center;flex:1}
.mc-flag{font-size:32px;display:flex;align-items:center;justify-content:center}
.mc-name{font-size:12px;font-weight:700;margin-top:2px}
.mc-vs{font-size:14px;font-weight:900;color:var(--t2)}
.mc-score{font-size:28px;font-weight:900;color:var(--g);letter-spacing:2px}
.mc-info{display:flex;justify-content:center;gap:16px;margin-top:10px;font-size:11px;color:var(--t2)}
.mc-info span{display:flex;align-items:center;gap:4px}
.mc-tv{margin-top:8px;padding:8px;background:rgba(0,230,118,.05);border-radius:8px;font-size:11px;color:var(--g);text-align:center;font-weight:600}

/* Team card */
.tc{background:var(--s1);border-radius:var(--r);padding:14px;margin-bottom:8px;border:1px solid var(--s3);display:flex;align-items:center;gap:12px;cursor:pointer}
.tc:active{border-color:var(--g)}
.tc-flag{font-size:36px}
.tc-info{flex:1}
.tc-name{font-size:15px;font-weight:800}
.tc-meta{font-size:11px;color:var(--t2)}
.tc-grp{font-size:12px;font-weight:800;color:var(--g);background:var(--gw);padding:3px 10px;border-radius:99px}

/* Player card */
.pc{background:var(--s1);border-radius:10px;padding:10px 12px;margin-bottom:6px;border:1px solid var(--s3);display:flex;align-items:center;gap:10px}
.pc-pos{font-size:10px;font-weight:800;padding:3px 8px;border-radius:6px;min-width:36px;text-align:center}
.pc-pos.att{background:rgba(255,23,68,.15);color:var(--rd)}
.pc-pos.mil{background:rgba(0,230,118,.15);color:var(--g)}
.pc-pos.def{background:rgba(33,150,243,.15);color:#2196F3}
.pc-pos.gar{background:rgba(255,179,0,.15);color:var(--am)}
.pc-name{font-size:13px;font-weight:700;flex:1}
.pc-stat{font-size:11px;color:var(--t2);text-align:right}

/* Group table */
.grp-t{width:100%;border-collapse:collapse;margin-bottom:14px}
.grp-t th{font-size:10px;color:var(--t2);text-align:center;padding:6px 4px;border-bottom:1px solid var(--s3)}
.grp-t th:first-child{text-align:left}
.grp-t td{font-size:12px;padding:8px 4px;text-align:center;border-bottom:1px solid rgba(255,255,255,.03)}
.grp-t td:first-child{text-align:left;font-weight:700}
.grp-t tr.qual td{color:var(--g)}

/* Prono */
.prono{background:var(--s1);border-radius:var(--r);padding:14px;margin-bottom:8px;border:1px solid var(--s3)}
.prono-input{display:flex;align-items:center;justify-content:center;gap:8px;margin:10px 0}
.prono-input input{width:50px;padding:10px;text-align:center;background:var(--s2);border:2px solid var(--s3);border-radius:10px;color:var(--g);font-size:22px;font-weight:900;font-family:inherit;outline:none}
.prono-input input:focus{border-color:var(--g)}

/* Section */
.sec{font-size:12px;font-weight:800;color:var(--t2);text-transform:uppercase;letter-spacing:.8px;margin:16px 0 8px}

/* Detail page */
.det-hero{text-align:center;padding:20px 0}
.det-flag{font-size:64px;display:flex;align-items:center;justify-content:center}
.det-name{font-size:24px;font-weight:900;margin-top:4px}
.det-meta{font-size:12px;color:var(--t2);margin-top:4px}
.det-tabs{display:flex;gap:4px;margin:12px 0;background:var(--s1);border-radius:10px;padding:3px}
.det-tab{flex:1;padding:8px;border:none;border-radius:8px;background:transparent;color:var(--t2);font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;text-align:center}
.det-tab.on{background:var(--gw);color:var(--g)}

.back{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:var(--s1);border:1px solid var(--s3);border-radius:99px;font-size:12px;font-weight:700;cursor:pointer;margin:10px 0;font-family:inherit;color:var(--tx)}
.empty{text-align:center;padding:40px;color:var(--t2)}.empty-i{font-size:48px;margin-bottom:10px}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:99px;font-size:13px;font-weight:700;z-index:999;animation:ti 2.5s forwards;background:var(--g);color:#000;font-family:inherit}
@keyframes ti{0%{opacity:0;transform:translateX(-50%) translateY(-10px)}10%,70%{opacity:1;transform:translateX(-50%) translateY(0)}100%{opacity:0;transform:translateX(-50%) translateY(-10px)}}
.btn{padding:14px;border:none;border-radius:10px;font-weight:800;font-size:14px;cursor:pointer;width:100%;font-family:inherit;background:var(--g);color:#000}
.pl-modal{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:200;display:flex;flex-direction:column;overflow-y:auto}
.pl-card{max-width:480px;width:100%;margin:0 auto;padding:16px}
.pl-hero{text-align:center;padding:24px 0;border-bottom:1px solid var(--s3)}
.pl-pos-big{display:inline-block;padding:6px 18px;border-radius:8px;font-size:14px;font-weight:900;margin-bottom:12px}
.pl-name-big{font-size:26px;font-weight:900;color:#fff}
.pl-club-big{font-size:15px;color:var(--g);margin-top:6px;font-weight:700}
.pl-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:16px 0}
.pl-st{background:var(--s1);border:1px solid var(--s3);border-radius:12px;padding:14px;text-align:center}
.pl-st-n{font-size:24px;font-weight:900;color:var(--g)}
.pl-st-l{font-size:10px;color:var(--t2);margin-top:2px;font-weight:700;text-transform:uppercase}
.pl-info{background:var(--s1);border:1px solid var(--s3);border-radius:12px;padding:16px;margin-bottom:8px}
.pl-info-r{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px}
.pl-info-r:last-child{border:none}
.pl-info-l{color:var(--t2)}
.pl-info-v{font-weight:700;color:var(--tx)}
.mc-team{cursor:pointer;transition:opacity .15s;border-radius:8px;padding:4px}.mc-team:active{opacity:.6;background:rgba(0,230,118,.1)}
.grp-t tr{transition:background .15s}.grp-t tr:active{background:rgba(0,230,118,.08)}
.ticker{background:var(--s1);border-bottom:1px solid var(--s3);overflow:hidden;height:32px;position:relative;cursor:pointer}
.ticker-wrap{display:flex;align-items:center;height:100%;white-space:nowrap;animation:scroll-left 12s linear infinite}
.ticker-wrap:hover{animation-play-state:paused}
.ticker-item{padding:0 24px;font-size:12px;font-weight:600;color:var(--tx);display:inline-flex;align-items:center;gap:6px}
.ticker-item span{color:var(--g);font-weight:800}
a.ticker-item:hover{color:var(--g)}
.ticker-dot{width:4px;height:4px;border-radius:50%;background:var(--g);flex-shrink:0}
@keyframes scroll-left{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.light{--bg:#f5f5f5;--s1:#fff;--s2:#f0f0f0;--s3:#ddd;--g:#059669;--g2:#047857;--gw:rgba(5,150,105,.1);--tx:#1a1a1a;--t2:#666;--t3:#999}
.light .nav{background:rgba(255,255,255,.97)}
.light .ticker{background:#fff;border-color:#eee}
.light .mc{background:#fff}
</style>
</head>

function t(key){return(I18N[LANG]&&I18N[LANG][key])||I18N.fr[key]||key}
function setLang(l){LANG=l;localStorage.setItem("ff26_lang",l);render()}

function render(){
  var a=document.getElementById("app"),h="";
  h+='<div class="ticker" id="ticker-bar" onclick="go(\'news\')"><div class="ticker-wrap" id="ticker-content"><div class="ticker-item"><span>⚽ FOOT FLASH</span> Chargement des actus...</div></div></div>';
  h+='<div class="hdr" onclick="go(\'cal\')" style="cursor:pointer"><h1>⚽ FOOT FLASH 2026</h1><div class="hdr-sub">Tap ici = retour accueil</div>';
  h+='<div style="display:flex;gap:8px;justify-content:center;margin-top:8px" onclick="event.stopPropagation()">';
  h+='<div class="my-team" onclick="goTeam(\''+V.myTeam+'\')">'+flagImg(V.myTeam,24)+" "+getTeam(V.myTeam).name+' →</div>';
  h+='<div class="my-team" onclick="cycleTeam()" style="background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.15);color:var(--t2)">✏️ Changer</div>';
  h+='<div class="my-team" onclick="exportCalendar(\''+V.myTeam+'\');event.stopPropagation()" style="background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.15);color:var(--t2)">📅 +Agenda</div>';
  h+='</div></div>';
  // Theme toggle
  h+='<div style="display:flex;justify-content:center;gap:8px;margin-bottom:4px" onclick="event.stopPropagation()">';
  h+='<button onclick="toggleTheme()" style="padding:4px 12px;background:var(--s1);border:1px solid var(--s3);border-radius:99px;color:var(--t2);font-size:11px;cursor:pointer;font-family:inherit">'+(document.body.classList.contains("light")?"🌙 "+t("dark"):"☀️ "+t("light"))+'</button>';
  h+='<select onchange="setLang(this.value)" style="padding:4px 8px;background:var(--s1);border:1px solid var(--s3);border-radius:99px;color:var(--t2);font-size:11px;font-family:inherit;cursor:pointer">';
  [{c:"fr",l:"🇫🇷 FR"},{c:"en",l:"🇬🇧 EN"},{c:"es",l:"🇪🇸 ES"},{c:"ar",l:"🇸🇦 AR"}].forEach(function(lg){
    h+='<option value="'+lg.c+'"'+(LANG===lg.c?" selected":"")+'>'+lg.l+'</option>';
  });
  h+='</select></div>';
  // Search bar
  h+='<div style="padding:0 4px;margin-bottom:8px"><div style="position:relative"><input id="srch" type="text" placeholder="🔍 Rechercher un pays, joueur..." oninput="doSearch(this.value)" style="width:100%;padding:12px 16px 12px 40px;background:var(--s1);border:1px solid var(--s3);border-radius:99px;color:var(--tx);font-size:14px;outline:none;font-family:inherit"><div id="srch-res"></div></div></div>';

  if(V.selTeam){h+='<div style="display:flex;gap:8px;margin:8px 0"><button class="back" onclick="V.selTeam=null;render()">← Équipes</button><button class="back" onclick="go(\'cal\')">📅 Calendrier</button></div>'}

  if(V.view==="cal")h+=rCal();
  else if(V.view==="groups")h+=rGroups();
  else if(V.view==="teams")h+=V.selTeam?rTeamDetail():rTeams();
  else if(V.view==="prono")h+=rProno();
  else if(V.view==="quiz")h+=rQuiz();
  else if(V.view==="history")h+=rHistory();
  else if(V.view==="bracket")h+=rBracket();
  else if(V.view==="simul")h+=rSimul();
  else if(V.view==="news")h+=rNews();

  h+='<div class="nav"><div class="nav-i">';
  h+=nb("cal","📅",t("matchs"))+nb("groups","🏆",t("groupes"))+nb("teams","👥",t("equipes"))+nb("prono","🎯",t("pronos"))+nb("quiz","🧠",t("quiz"))+nb("bracket","🏅",t("tableau"))+nb("simul","🎮",t("simul"))+nb("news","📰",t("actus"))+nb("history","📜",t("palmares"));
  h+="</div></div>";
  a.innerHTML=h;
  if(window._tickerItems)setTimeout(updateTicker,50);
}
function nb(v,i,l){return'<button class="'+(V.view===v?"on":"")+'" onclick="go(\''+v+'\')"><span class="ic">'+i+"</span>"+l+"</button>"}

function cycleTeam(){var ids=TEAMS.map(function(t){return t.id});var i=ids.indexOf(V.myTeam);V.myTeam=ids[(i+1)%ids.length];render()}

// Calendar
function rCal(){
  // Countdown to next match
  var now=Date.now();
  var next=null;
  var myMs=MATCHES.filter(function(m){return m.t1===V.myTeam||m.t2===V.myTeam});
  var allMs=MATCHES.filter(function(m){return new Date(m.d).getTime()>now&&m.t1!=="TBD"});
  var nextMy=myMs.filter(function(m){return new Date(m.d).getTime()>now})[0];
  var nextAll=allMs[0];
  next=nextMy||nextAll;
  if(next){
    var diff=new Date(next.d).getTime()-now;
    var days=Math.floor(diff/86400000);
    var hrs=Math.floor((diff%86400000)/3600000);
    var mins=Math.floor((diff%3600000)/60000);
    var secs=Math.floor((diff%60000)/1000);
    var opp=next.t1===V.myTeam?getTeam(next.t2):next.t2===V.myTeam?getTeam(next.t1):getTeam(next.t2);
    var oppId=next.t1===V.myTeam?next.t2:next.t2===V.myTeam?next.t1:next.t2;
    var isMyMatch=next.t1===V.myTeam||next.t2===V.myTeam;
    h+='<div style="background:'+(isMyMatch?'linear-gradient(135deg,rgba(0,230,118,.1),rgba(0,200,83,.05))':'var(--s1)')+';border:1px solid '+(isMyMatch?'var(--g)':'var(--s3)')+';border-radius:var(--r);padding:16px;margin-bottom:12px;text-align:center">';
    h+='<div style="font-size:10px;font-weight:800;color:'+(isMyMatch?'var(--g)':'var(--t2)')+';letter-spacing:1px;text-transform:uppercase">'+(isMyMatch?"Prochain match "+getTeam(V.myTeam).name:"Prochain match")+'</div>';
    h+='<div style="display:flex;align-items:center;justify-content:center;gap:12px;margin:10px 0">';
    if(isMyMatch)h+=flagImg(V.myTeam,32);
    h+='<div style="font-size:15px;font-weight:900;color:var(--tx)">'+getTeam(next.t1).name+' vs '+opp.name+'</div>';
    h+=flagImg(oppId,32);
    h+='</div>';
    h+='<div style="display:flex;justify-content:center;gap:8px;margin:8px 0">';
    h+='<div id="cd-timer" data-target="'+new Date(next.d).getTime()+'">';
    [{v:days,l:"JOURS"},{v:hrs,l:"HEURES"},{v:mins,l:"MIN"},{v:secs,l:"SEC"}].forEach(function(u){
      h+='<div style="background:var(--s2);border-radius:8px;padding:8px 6px;min-width:52px;text-align:center"><div style="font-size:22px;font-weight:900;color:var(--g)">'+u.v+'</div><div style="font-size:8px;color:var(--t2);font-weight:700">'+u.l+'</div></div>';
    });
    h+='</div>';
    h+='</div>';
    h+='<div style="font-size:11px;color:var(--t2)">'+fmtDate(next.d)+' · '+fmtTime(next.d)+' · 📍 '+next.city+'</div>';
    h+='</div>';
  }
  var matches=MATCHES.slice();
  if(V.filter==="mine")matches=matches.filter(function(m){return m.t1===V.myTeam||m.t2===V.myTeam});
  matches.sort(function(a,b){return new Date(a.d)-new Date(b.d)});

  var h='<div class="filters">';
  h+='<button class="fil'+(V.filter==="all"?" on":"")+'" onclick="V.filter=\'all\';render()">Tous</button>';
  h+='<button class="fil'+(V.filter==="mine"?" on":"")+'" onclick="V.filter=\'mine\';render()">'+flagImg(V.myTeam,16)+' Mon équipe</button>';
  var allGroups={};TEAMS.forEach(function(t){allGroups[t.group]=true});
  Object.keys(allGroups).sort().forEach(function(g){
    h+='<button class="fil'+(V.filter==="G"+g?" on":"")+'" onclick="V.filter=\'G'+g+'\';render()">Gr.'+g+"</button>";
  });
  h+="</div>";

  if(V.filter&&V.filter.startsWith("G"))matches=matches.filter(function(m){return m.st.indexOf("Groupe "+V.filter[1])>=0});

  // Show group table when filtering by team or group
  var showGroup=null;
  if(V.filter==="mine"){var mt=getTeam(V.myTeam);if(mt.group)showGroup=mt.group}
  if(V.filter&&V.filter.startsWith("G"))showGroup=V.filter[1];
  if(showGroup){
    var gTeams=TEAMS.filter(function(t){return t.group===showGroup});
    h+='<div style="background:var(--s1);border:1px solid var(--s3);border-radius:var(--r);padding:12px;margin-bottom:12px">';
    h+='<div style="font-size:12px;font-weight:900;color:var(--g);margin-bottom:8px">📊 CLASSEMENT GROUPE '+showGroup+'</div>';
    h+='<table class="grp-t"><tr><th>Équipe</th><th>Pts</th><th>J</th><th>G</th><th>N</th><th>P</th><th>Diff</th></tr>';
    gTeams.forEach(function(t,i){
      h+='<tr class="'+(i<2?"qual":"")+'" style="cursor:pointer" onclick="goTeam(\''+t.id+'\')">';
      h+='<td>'+flagImg(t.id,16)+' '+t.name+'</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td></tr>';
    });
    h+='</table>';
    h+='<div style="font-size:10px;color:var(--t2);text-align:center">Top 2 qualifiés ✓ + 8 meilleurs 3es</div></div>';
  }

  if(!matches.length)return h+'<div class="empty"><div class="empty-i">📅</div>Aucun match</div>';

  var lastDate="";
  matches.forEach(function(m){
    var dt=fmtDate(m.d);
    if(dt!==lastDate){h+='<div class="sec">'+dt+"</div>";lastDate=dt}
    var t1=getTeam(m.t1),t2=getTeam(m.t2);
    var st=matchStatus(m.d);
    h+='<div class="mc'+(st==="live"?" live":"")+(st==="soon"?" soon":"")+'">';
    // Status
    if(st==="live")h+='<div class="mc-status" style="color:var(--g)"><span class="dot" style="background:var(--g)"></span>EN COURS</div>';
    else if(st==="soon")h+='<div class="mc-status" style="color:var(--am)">⏰ BIENTÔT — '+fmtTime(m.d)+"</div>";
    else if(st==="done")h+='<div class="mc-status" style="color:var(--t2)">TERMINÉ</div>';
    else h+='<div class="mc-status" style="color:var(--t2)">'+fmtTime(m.d)+" · "+m.st+"</div>";
    // Teams
    h+='<div class="mc-teams"><div class="mc-team" onclick="event.stopPropagation();goTeam(\''+m.t1+'\')"><div class="mc-flag">'+flagImg(m.t1,36)+'</div><div class="mc-name" style="text-decoration:underline;text-decoration-color:rgba(255,255,255,.2)">'+t1.name+"</div></div>";
    if(m.s1!==null)h+='<div class="mc-score">'+m.s1+" - "+m.s2+"</div>";
    else h+='<div class="mc-vs">VS</div>';
    h+='<div class="mc-team" onclick="event.stopPropagation();goTeam(\''+m.t2+'\')"><div class="mc-flag">'+flagImg(m.t2,36)+'</div><div class="mc-name" style="text-decoration:underline;text-decoration-color:rgba(255,255,255,.2)">'+t2.name+"</div></div></div>";
    // Info
    h+='<div class="mc-info"><span>📍 '+m.city+"</span><span>🏟️ "+m.stad+"</span></div>";
    // TV
    var tv=TV[V.myTeam]?TV[V.myTeam].ch:(TV["default"].ch);
    h+='<div class="mc-tv">📺 '+tv+"</div>";
    h+='<div onclick="event.stopPropagation();exportMatch('+m.id+')" style="text-align:center;padding:6px;font-size:11px;color:var(--g);cursor:pointer;font-weight:700;margin-top:4px">📅 Ajouter a l\'agenda</div>';
    h+="</div>";
  });
  return h;
}

// Groups
function rGroups(){
  var groups={};
  TEAMS.forEach(function(t){if(!groups[t.group])groups[t.group]=[];groups[t.group].push(t)});
  var h="";
  Object.keys(groups).sort().forEach(function(g){
    h+='<div class="sec">Groupe '+g+"</div>";
    h+='<table class="grp-t"><tr><th>Équipe</th><th>Pts</th><th>J</th><th>G</th><th>N</th><th>P</th><th>Diff</th></tr>';
    groups[g].forEach(function(t,i){
      h+='<tr class="'+(i<2?"qual":"")+'" style="cursor:pointer" onclick="goTeam(\''+t.id+'\')" ><td>'+flagImg(t.id,20)+" "+t.name+"</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td></tr>";
    });
    h+="</table>";
  });
  h+='<button onclick="showRules()" style="display:block;width:100%;padding:10px;background:var(--s1);border:1px solid var(--s3);border-radius:10px;color:var(--g);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:12px;text-align:center">📜 Reglement : departage et classement</button>';
  return h;
}

// Teams list
function rTeams(){
  var h="";
  TEAMS.forEach(function(t){
    h+='<div class="tc" onclick="goTeam(\''+t.id+'\')">';
    h+='<div class="tc-flag">'+flagImg(t.id,40)+"</div>";
    h+='<div class="tc-info"><div class="tc-name">'+t.name+"</div>";
    h+='<div class="tc-meta">FIFA #'+t.rank+" · "+t.titles+" · "+t.coach+"</div></div>";
    h+='<span class="tc-grp">'+t.group+"</span></div>";
  });
  return h;
}

// Team detail
function rTeamDetail(){
  var t=getTeam(V.selTeam);if(!t.players)return'Équipe non trouvée';
  var h='';
  h+='<div class="det-hero"><div class="det-flag">'+flagImg(t.id,80)+"</div>";
  h+='<div class="det-name">'+t.name+"</div>";
  h+='<div class="det-meta">Groupe '+t.group+" · FIFA #"+t.rank+" · "+t.titles+"</div>";
  h+='<div class="det-meta">Coach: '+t.coach+"</div></div>";
  // Team's own matches
  var ms=MATCHES.filter(function(m){return (m.t1===V.selTeam||m.t2===V.selTeam)&&m.t1!=="TBD"});
  if(ms.length){
    h+='<div class="sec">📅 Matchs de '+t.name+'</div>';
    ms.forEach(function(m){
      var opp=m.t1===V.selTeam?getTeam(m.t2):getTeam(m.t1);
      var oppId=m.t1===V.selTeam?m.t2:m.t1;
      h+='<div style="background:var(--s1);border:1px solid var(--s3);border-radius:10px;padding:12px;margin-bottom:6px;display:flex;align-items:center;gap:10px;cursor:pointer" onclick="goTeam(\''+oppId+'\')">';
      h+='<div style="min-width:75px"><div style="font-size:11px;font-weight:800;color:var(--g)">'+fmtDate(m.d)+'</div><div style="font-size:10px;color:var(--t2)">'+fmtTime(m.d)+'</div></div>';
      h+='<div style="flex:1;display:flex;align-items:center;gap:8px">'+flagImg(V.selTeam,24)+'<span style="font-size:12px;font-weight:800;color:var(--t2)">VS</span>'+flagImg(oppId,24)+'<span style="font-weight:700;font-size:13px">'+opp.name+'</span></div>';
      h+='<div style="text-align:right;font-size:10px;color:var(--t2)"><div>📍 '+m.city+'</div><div>🏟️ '+m.stad+'</div></div>';
      h+='</div>';
    });
    h+='<button onclick="exportCalendar(\''+V.selTeam+'\')" style="width:100%;padding:14px;background:var(--gw);border:1px solid var(--g);border-radius:10px;color:var(--g);font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;margin-top:4px">📅 Ajouter les matchs a mon agenda</button>';
  }
  // Group standings
  var grpTeams=TEAMS.filter(function(x){return x.group===t.group});
  h+='<div class="sec">🏆 Classement Groupe '+t.group+'</div>';
  h+='<table class="grp-t"><tr><th>Équipe</th><th>Pts</th><th>J</th><th>G</th><th>N</th><th>P</th><th>Diff</th></tr>';
  grpTeams.forEach(function(gt,i){
    var isCurrent=gt.id===V.selTeam;
    h+='<tr class="'+(i<2?"qual":"")+'" style="cursor:pointer;'+(isCurrent?"background:var(--gw)":"")+'" onclick="goTeam(\''+gt.id+'\')">';
    h+='<td>'+flagImg(gt.id,18)+" "+(isCurrent?"<strong>"+gt.name+"</strong>":gt.name)+"</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td></tr>";
  });

  if(!allDone||V.simStep1){
    Object.keys(groups).sort().forEach(function(g){

function toggleSimPick(g,tid){
  if(!V.simPicks[g])V.simPicks[g]=[];
  var idx=V.simPicks[g].indexOf(tid);
  if(idx>=0)V.simPicks[g].splice(idx,1);
  else if(V.simPicks[g].length<2)V.simPicks[g].push(tid);
  else V.simPicks[g]=[tid];
  V.simKO={};render();
}

function pickKO(mid,tid){
  if(!V.simKO)V.simKO={};
  var old=V.simKO[mid];
  V.simKO[mid]=tid;
  if(old&&old!==tid){
    // Clear all rounds after this one
    var order=["r","h","q","s","f"];
    var myPrefix=mid[0];
    var myIdx=order.indexOf(myPrefix);
    Object.keys(V.simKO).forEach(function(k){
      var kIdx=order.indexOf(k[0]);
      if(kIdx>myIdx)delete V.simKO[k];
    });
  }
  render();
}

function rHistory(){
  var h='';
  // Tab selector
  if(!V.histTab)V.histTab="wc";
  h+='<div style="display:flex;gap:4px;margin:8px 0;background:var(--s1);border-radius:10px;padding:3px">';
  [{k:"wc",l:"🏆 Mondial"},{k:"bo",l:"🏅 Ballon d\'Or"}].forEach(function(tab){
    h+='<button onclick="V.histTab=\''+tab.k+'\';render()" style="flex:1;padding:10px;border:none;border-radius:8px;background:'+(V.histTab===tab.k?'var(--gw)':'transparent')+';color:'+(V.histTab===tab.k?'var(--g)':'var(--t2)')+';font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">'+tab.l+'</button>';
  });
  h+='</div>';

  if(V.histTab==="wc"){
    // === WORLD CUP TAB ===
    // Titles count
    h+='<div class="sec">🏆 Palmares Coupe du Monde</div>';
    var titles={};WC_WINNERS.forEach(function(w){titles[w.w]=(titles[w.w]||0)+1});
    var sorted=Object.keys(titles).sort(function(a,b){return titles[b]-titles[a]});
    h+='<div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap">';
    sorted.forEach(function(t){
      h+='<div style="background:var(--s1);border:1px solid var(--s3);border-radius:8px;padding:8px 10px;text-align:center;flex:1;min-width:70px">';
      h+='<div style="font-size:18px;font-weight:900;color:var(--g)">'+titles[t]+'</div>';

    });
    h+='</div>';

    // All finals
    h+='<div class="sec">📜 Toutes les finales (1930-2022)</div>';

      h+='<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.03)">';

    h+='</div>';

  } else {
    // === BALLON D'OR TAB ===
    h+='<div class="sec">🏆 Ballon d\'Or — Tous les laureats</div>';
    var byC={};BALLONDOR.forEach(function(b){byC[b.c]=(byC[b.c]||0)+1});
    var top=Object.keys(byC).sort(function(a,b){return byC[b]-byC[a]}).slice(0,5);
    h+='<div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap">';

    var byP={};BALLONDOR.forEach(function(b){byP[b.p]=(byP[b.p]||0)+1});
    var topP=Object.keys(byP).sort(function(a,b){return byP[b]-byP[a]}).slice(0,5);
    h+='<div class="sec">👑 Record de victoires</div>';
    topP.forEach(function(p,i){
      var b=BALLONDOR.find(function(x){return x.p===p});
      h+='<div style="background:var(--s1);border:1px solid var(--s3);border-radius:10px;padding:12px;margin-bottom:6px;display:flex;align-items:center;gap:12px">';
      h+='<div style="font-size:20px;font-weight:900;color:'+(i===0?'var(--g)':i===1?'var(--am)':'var(--t2)')+'">'+byP[p]+'x</div>';

    });
    h+='<div class="sec">📜 Tous les laureats (1956-2025)</div>';
    var decade="";
    BALLONDOR.forEach(function(b){
      var d=Math.floor(b.y/10)*10+"s";
      if(d!==decade){h+='<div style="font-size:11px;font-weight:800;color:var(--g);margin:12px 0 6px;padding:4px 10px;background:var(--gw);border-radius:6px;display:inline-block">'+d+'</div>';decade=d}
      h+='<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.03)">';
      h+='<div style="font-size:14px;font-weight:900;color:var(--g);min-width:40px">'+b.y+'</div>';
      h+='<div style="flex:1"><div style="font-weight:700;font-size:13px">'+b.p+'</div><div style="font-size:11px;color:var(--t2)">'+b.c+' · '+b.club+'</div></div></div>';
    });
    h+='<div class="sec">🇫🇷 Ballons d\'Or francais</div>';
    BALLONDOR.filter(function(b){return b.c==="FRA"}).forEach(function(b){
      h+='<div style="background:var(--gw);border-radius:10px;padding:12px;margin-bottom:6px;display:flex;align-items:center;gap:10px">';

      h+='<div><div style="font-weight:800">'+b.p+'</div><div style="font-size:11px;color:var(--t2)">'+b.club+'</div></div></div>';
    });
  }
  return h;
}

function showPlayer(teamId,pid){
  var t=getTeam(teamId);if(!t||!t.players)return;
  var pname=decodeURIComponent(pid);
  var p=t.players.find(function(x){return x.n===pname});if(!p)return;
  
  var posLabels={ATT:"Attaquant",MIL:"Milieu de terrain",DEF:"Defenseur",GAR:"Gardien de but"};
  var posEmoji={ATT:"⚽",MIL:"🎯",DEF:"🛡️",GAR:"🧤"};
  var posColors={ATT:"rgba(255,23,68,.15)",MIL:"rgba(0,230,118,.15)",DEF:"rgba(33,150,243,.15)",GAR:"rgba(255,179,0,.15)"};
  var posTxt={ATT:"var(--rd)",MIL:"var(--g)",DEF:"#2196F3",GAR:"var(--am)"};
  var ratio=p.caps>0?Math.round(p.g/p.caps*100)/100:0;
  var level=p.bo?"Ballon d'Or":p.caps>=100?"Legendaire":p.caps>=50?"Experimente":p.caps>=20?"Confirme":p.caps>=10?"International":"Espoir";
  var levelColor=p.bo?"var(--am)":p.caps>=100?"#FFD700":p.caps>=50?"var(--g)":p.caps>=20?"#2196F3":"var(--t2)";
  
  // Generate initials for avatar
  var parts=p.n.split(" ");
  var initials=parts.length>1?parts[0][0]+parts[parts.length-1][0]:p.n.substring(0,2);
  
  // Estimate stats based on position and goals/caps
  var attScore,defScore,pasScore,phyScore,speScore;
  if(p.p==="ATT"){attScore=70+Math.min(25,p.g);defScore=25+Math.random()*15|0;pasScore=55+Math.random()*20|0;phyScore=60+Math.random()*20|0;speScore=70+Math.random()*20|0}
  else if(p.p==="MIL"){attScore=40+Math.min(20,p.g*2);defScore=55+Math.random()*20|0;pasScore=70+Math.random()*20|0;phyScore=65+Math.random()*15|0;speScore=55+Math.random()*20|0}
  else if(p.p==="DEF"){attScore=20+Math.min(15,p.g*3);defScore=75+Math.random()*20|0;pasScore=55+Math.random()*15|0;phyScore=75+Math.random()*15|0;speScore=50+Math.random()*20|0}
  else{attScore=5;defScore=40+Math.random()*10|0;pasScore=45+Math.random()*15|0;phyScore=65+Math.random()*15|0;speScore=35+Math.random()*15|0}
  // Cap at 99
  attScore=Math.min(99,attScore|0);defScore=Math.min(99,defScore|0);pasScore=Math.min(99,pasScore|0);phyScore=Math.min(99,phyScore|0);speScore=Math.min(99,speScore|0);
  var overall=Math.round((attScore+defScore+pasScore+phyScore+speScore)/5);
  if(p.bo)overall=Math.max(92,overall);
  if(p.caps>=100)overall=Math.max(85,overall);
  
  // Team matches for context
  var teamMs=MATCHES.filter(function(m){return (m.t1===teamId||m.t2===teamId)&&m.t1!=="TBD"});
  
  var el=document.createElement("div");
  el.className="pl-modal";el.id="pl-modal";
  el.onclick=function(e){if(e.target===el)el.remove()};
  
  var h='<div class="pl-card">';
  h+='<button class="back" onclick="document.getElementById(\'pl-modal\').remove()">← Retour a l\'effectif</button>';
  
  // HERO with big initials avatar
  h+='<div style="text-align:center;padding:20px 0;background:linear-gradient(180deg,var(--s2),transparent);border-radius:var(--r);margin-bottom:12px">';
  h+='<div style="width:80px;height:80px;border-radius:50%;background:'+posColors[p.p]+';border:3px solid '+posTxt[p.p]+';display:flex;align-items:center;justify-content:center;margin:0 auto;font-size:28px;font-weight:900;color:'+posTxt[p.p]+'">'+initials+'</div>';
  h+='<div style="font-size:24px;font-weight:900;margin-top:10px;color:#fff">'+p.n+'</div>';
  h+='<div style="font-size:14px;color:var(--g);font-weight:700;margin-top:4px">'+p.club+'</div>';
  h+='<div style="display:flex;gap:12px;justify-content:center;margin-top:10px">';
  h+='<div style="background:var(--s2);padding:4px 12px;border-radius:8px;font-size:12px"><span style="font-weight:900;color:var(--g)">'+p.caps+'</span> <span style="color:var(--t2)">selections</span></div>';
  h+='<div style="background:var(--s2);padding:4px 12px;border-radius:8px;font-size:12px"><span style="font-weight:900;color:var(--g)">'+p.g+'</span> <span style="color:var(--t2)">buts</span></div>';
  if(p.wc)h+='<div style="background:var(--s2);padding:4px 12px;border-radius:8px;font-size:12px"><span style="font-weight:900;color:var(--g)">'+p.wc+'</span> <span style="color:var(--t2)">Coupes du Monde</span></div>';
  h+='</div>';
  h+='<div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px">';
  h+=flagImg(teamId,24)+'<span style="font-size:13px;color:var(--t2)">'+t.name+'</span>';
  h+='<span style="background:'+posColors[p.p]+';color:'+posTxt[p.p]+';padding:3px 10px;border-radius:6px;font-size:11px;font-weight:800">'+posEmoji[p.p]+' '+posLabels[p.p]+'</span>';
  h+='</div>';
  // Ballon d'Or badge
  if(p.bo)h+='<div style="margin-top:10px;display:inline-block;background:linear-gradient(135deg,#FFD700,#FFA000);padding:5px 16px;border-radius:99px;font-size:12px;font-weight:900;color:#000">🏆 Ballon d\'Or '+p.bo+'</div>';
  h+='</div>';
  
  // OVERALL RATING
  h+='<div style="display:flex;gap:8px;margin-bottom:12px">';
  h+='<div style="flex:1;background:var(--s1);border:1px solid var(--s3);border-radius:12px;padding:14px;text-align:center"><div style="font-size:36px;font-weight:900;color:'+levelColor+'">'+overall+'</div><div style="font-size:10px;color:var(--t2);font-weight:700">NOTE GLOBALE</div></div>';
  h+='<div style="flex:1;background:var(--s1);border:1px solid var(--s3);border-radius:12px;padding:14px;text-align:center"><div style="font-size:12px;font-weight:800;color:'+levelColor+';margin-bottom:4px">'+level+'</div><div style="font-size:10px;color:var(--t2)">'+p.caps+' selections</div><div style="font-size:10px;color:var(--t2)">'+p.g+' buts</div></div>';
  h+='</div>';
  
  // STATS EN SELECTION
  h+='<div class="pl-info"><div style="font-size:12px;font-weight:800;color:var(--g);margin-bottom:10px">📊 STATS EN SELECTION</div>';
  var stats=[
    {l:"Selections",v:p.caps,icon:"🏟️"},
    {l:"Buts",v:p.g,icon:"⚽"},
    {l:"Ratio buts/match",v:ratio,icon:"📈"},
    {l:"Coupes du Monde",v:p.wc||"1re",icon:"🌍"},
  ];
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">';
  stats.forEach(function(s){
    h+='<div style="background:var(--s2);border-radius:8px;padding:10px;text-align:center">';
    h+='<div style="font-size:10px;color:var(--t2)">'+s.icon+' '+s.l+'</div>';
    h+='<div style="font-size:20px;font-weight:900;color:var(--g)">'+s.v+'</div></div>';
  });
  h+='</div></div>';
  
  // ATTRIBUTS (FIFA-style bars)
  h+='<div class="pl-info"><div style="font-size:12px;font-weight:800;color:var(--g);margin-bottom:10px">🎮 ATTRIBUTS</div>';
  var attrs=[
    {l:"Attaque",v:attScore,c:"var(--rd)"},
    {l:"Defense",v:defScore,c:"#2196F3"},
    {l:"Passe",v:pasScore,c:"var(--g)"},
    {l:"Physique",v:phyScore,c:"var(--am)"},
    {l:"Vitesse",v:speScore,c:"#E040FB"}
  ];
  attrs.forEach(function(a){
    var barColor=a.v>=80?a.c:a.v>=60?"var(--am)":"var(--t2)";
    h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">';
    h+='<div style="width:65px;font-size:11px;color:var(--t2);font-weight:700">'+a.l+'</div>';

function doSearch(q){
  var box=document.getElementById("srch-res");if(!box)return;
  if(!q||q.length<2){box.innerHTML="";return}
  q=q.toLowerCase();
  var results=[];
  // Search teams
  TEAMS.forEach(function(t){
    if(t.name.toLowerCase().indexOf(q)>-1||t.id.toLowerCase().indexOf(q)>-1||t.coach.toLowerCase().indexOf(q)>-1||("groupe "+t.group).toLowerCase().indexOf(q)>-1){
      results.push({type:"team",id:t.id,name:t.name,sub:"Groupe "+t.group+" · FIFA #"+t.rank+" · "+t.coach});
    }
    // Search players
    (t.players||[]).forEach(function(p){
      if(p.n.toLowerCase().indexOf(q)>-1||p.club.toLowerCase().indexOf(q)>-1){
        results.push({type:"player",id:t.id,pn:p.n,name:p.n,sub:t.name+" · "+p.club+" · "+p.p});
      }
    });
  });
  if(!results.length){box.innerHTML='<div style="position:absolute;top:4px;left:0;right:0;background:var(--s1);border:1px solid var(--s3);border-radius:12px;padding:16px;text-align:center;z-index:50;color:var(--t2);font-size:13px">Aucun resultat pour "'+q+'"</div>';return}
  var h='<div style="position:absolute;top:4px;left:0;right:0;background:var(--s1);border:1px solid var(--s3);border-radius:12px;max-height:300px;overflow-y:auto;z-index:50">';
  results.slice(0,10).forEach(function(r){
    var onclick=r.type==="team"?'goTeam(\''+r.id+'\')':'showPlayer(\''+r.id+'\',\''+encodeURIComponent(r.pn)+'\')';
    h+='<div onclick="document.getElementById(\'srch\').value=\'\';document.getElementById(\'srch-res\').innerHTML=\'\';'+onclick+'" style="padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;display:flex;align-items:center;gap:10px">';
    h+=flagImg(r.id,20);
    h+='<div style="flex:1"><div style="font-weight:700;font-size:13px">'+r.name+'</div><div style="font-size:11px;color:var(--t2)">'+r.sub+'</div></div>';
    h+='<span style="font-size:10px;color:var(--t2);background:var(--s2);padding:2px 8px;border-radius:6px">'+(r.type==="team"?"Equipe":"Joueur")+'</span>';
    h+='</div>';
  });
  if(results.length>10)h+='<div style="padding:10px;text-align:center;font-size:11px;color:var(--t2)">+'+(results.length-10)+' autres resultats</div>';
  h+='</div>';
  box.innerHTML=h;
}

function loadFeed(idx){
  var feed=RSS_FEEDS[idx];
  var box=document.getElementById("news-feed");
  if(!box)return;
  box.innerHTML='<div style="text-align:center;padding:30px;color:var(--g)">Chargement '+feed.name+'...</div>';
  var proxy="https://api.rss2json.com/v1/api.json?rss_url="+encodeURIComponent(feed.url);
  fetch(proxy).then(function(r){return r.json()}).then(function(data){
    if(!data.items||!data.items.length){showStaticNews(box);return}
    var h='<div style="font-size:13px;font-weight:800;color:var(--g);margin-bottom:8px">'+feed.icon+' '+feed.name+' — '+(data.items.length)+' articles</div>';
    data.items.slice(0,15).forEach(function(item){
      var date=item.pubDate?new Date(item.pubDate).toLocaleDateString("fr-FR",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"}):"";
      var desc=(item.description||"").replace(/<[^>]+>/g,"").slice(0,120);
      h+='<a href="'+item.link+'" target="_blank" style="display:block;background:var(--s1);border:1px solid var(--s3);border-radius:10px;padding:12px;margin-bottom:6px;text-decoration:none;color:var(--tx)">';
      if(item.thumbnail||item.enclosure&&item.enclosure.link){
        var img=item.thumbnail||item.enclosure.link;
        h+='<div style="display:flex;gap:10px;align-items:start">';
        h+='<img src="'+img+'" style="width:70px;height:50px;object-fit:cover;border-radius:6px;flex-shrink:0" onerror="this.style.display=\'none\'">';
        h+='<div style="flex:1">';
      }else{
        h+='<div>';
      }
      h+='<div style="font-size:13px;font-weight:700;line-height:1.4">'+item.title+'</div>';
      if(desc)h+='<div style="font-size:11px;color:var(--t2);margin-top:4px;line-height:1.3">'+desc+'...</div>';
      if(date)h+='<div style="font-size:10px;color:var(--t3);margin-top:4px">'+date+'</div>';
      h+='</div>';
      if(item.thumbnail||item.enclosure&&item.enclosure.link)h+='</div>';
      h+='</a>';
    });
    box.innerHTML=h;
  }).catch(function(err){
    showStaticNews(box);
  });
}

function exportMatch(mid){
  var m=MATCHES.find(function(x){return x.id===mid});if(!m)return;
  var t1=getTeam(m.t1),t2=getTeam(m.t2);
  var dt=new Date(m.d);
  var pad=function(n){return n<10?"0"+n:""+n};
  var dtS=dt.getUTCFullYear()+pad(dt.getUTCMonth()+1)+pad(dt.getUTCDate())+"T"+pad(dt.getUTCHours())+pad(dt.getUTCMinutes())+"00Z";
  var dtE=new Date(dt.getTime()+7200000);
  var dtES=dtE.getUTCFullYear()+pad(dtE.getUTCMonth()+1)+pad(dtE.getUTCDate())+"T"+pad(dtE.getUTCHours())+pad(dtE.getUTCMinutes())+"00Z";
  var now=new Date();var stamp=now.getUTCFullYear()+pad(now.getUTCMonth()+1)+pad(now.getUTCDate())+"T"+pad(now.getUTCHours())+pad(now.getUTCMinutes())+pad(now.getUTCSeconds())+"Z";
  var ics="BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//Foot Flash 2026//FR\r\nBEGIN:VEVENT\r\nDTSTART:"+dtS+"\r\nDTEND:"+dtES+"\r\nDTSTAMP:"+stamp+"\r\nUID:ff26-"+m.id+"@footflash.app\r\nSUMMARY:"+fe(m.t1)+" "+t1.name+" vs "+fe(m.t2)+" "+t2.name+" ⚽ Mondial 2026\r\nLOCATION:"+m.stad+", "+m.city+"\r\nDESCRIPTION:⚽ "+m.st+" - Mondial 2026\\n🏟️ "+m.stad+", "+m.city+"\r\nBEGIN:VALARM\r\nTRIGGER:-PT30M\r\nACTION:DISPLAY\r\nDESCRIPTION:⚽ Match dans 30min !\r\nEND:VALARM\r\nEND:VEVENT\r\nEND:VCALENDAR";
  var blob=new Blob([ics],{type:"text/calendar"});var url=URL.createObjectURL(blob);
  var a=document.createElement("a");a.href=url;a.download="match-"+t1.name+"-vs-"+t2.name+".ics";document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);
  toast("📅 Match ajoute !");
}

function exportCalendar(teamId){
  var t=getTeam(teamId);
  var ms=MATCHES.filter(function(m){return (m.t1===teamId||m.t2===teamId)&&m.t1!=="TBD"});
  if(!ms.length){toast("Pas de matchs");return}
  
  var ics="BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//Foot Flash 2026//FR\r\nCALSCALE:GREGORIAN\r\nX-WR-CALNAME:Mondial 2026 - "+t.name+"\r\n";
  
  ms.forEach(function(m){
    var opp=m.t1===teamId?getTeam(m.t2):getTeam(m.t1);
    var dt=new Date(m.d);
    var pad=function(n){return n<10?"0"+n:""+n};
    var dtStart=dt.getUTCFullYear()+pad(dt.getUTCMonth()+1)+pad(dt.getUTCDate())+"T"+pad(dt.getUTCHours())+pad(dt.getUTCMinutes())+"00Z";
    var dtEnd=new Date(dt.getTime()+7200000);
    var dtEndStr=dtEnd.getUTCFullYear()+pad(dtEnd.getUTCMonth()+1)+pad(dtEnd.getUTCDate())+"T"+pad(dtEnd.getUTCHours())+pad(dtEnd.getUTCMinutes())+"00Z";
    var now=new Date();
    var stamp=now.getUTCFullYear()+pad(now.getUTCMonth()+1)+pad(now.getUTCDate())+"T"+pad(now.getUTCHours())+pad(now.getUTCMinutes())+pad(now.getUTCSeconds())+"Z";
    
    ics+="BEGIN:VEVENT\r\n";
    ics+="DTSTART:"+dtStart+"\r\n";
    ics+="DTEND:"+dtEndStr+"\r\n";
    ics+="DTSTAMP:"+stamp+"\r\n";
    ics+="UID:footflash2026-"+m.id+"@footflash.app\r\n";
    ics+="SUMMARY:"+fe(teamId)+" "+t.name+" vs "+fe(m.t1===teamId?m.t2:m.t1)+" "+opp.name+" - Mondial 2026\r\n";
    ics+="LOCATION:"+m.stad+", "+m.city+"\r\n";
    ics+="DESCRIPTION:⚽ "+m.st+" - Coupe du Monde FIFA 2026\\n🏟️ "+m.stad+", "+m.city+"\\n📺 A ne pas manquer !\\n\\nGenere par Foot Flash 2026\r\n";
    ics+="BEGIN:VALARM\r\nTRIGGER:-PT30M\r\nACTION:DISPLAY\r\nDESCRIPTION:"+t.name+" vs "+opp.name+" dans 30 minutes !\r\nEND:VALARM\r\n";
    ics+="END:VEVENT\r\n";
  });
  ics+="END:VCALENDAR";
  
  var blob=new Blob([ics],{type:"text/calendar;charset=utf-8"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");
  a.href=url;
  a.download="mondial-2026-"+teamId.toLowerCase()+".ics";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast("📅 "+ms.length+" matchs exportes !");
}

        {title:"Match d'ouverture : Mexique vs Afrique du Sud le 11 juin a Mexico"},
        {title:"Finale au MetLife Stadium de New York le 19 juillet 2026"},
        {title:"Erling Haaland et la Norvege dans le groupe de la France"},
        {title:"Lamine Yamal (18 ans) plus jeune star du Mondial 2026"},
        {title:"Lionel Messi : derniere Coupe du Monde a 39 ans ?"}
      ];
      tickerLoaded=true;
      updateTicker();
      return;
    }
    var url="https://api.rss2json.com/v1/api.json?rss_url="+encodeURIComponent(feeds[tried]);
    tried++;
    fetch(url,{signal:AbortSignal.timeout(5000)}).then(function(r){return r.json()}).then(function(data){
      if(data.items&&data.items.length){
        tickerLoaded=true;
        window._tickerItems=data.items.slice(0,10);
        updateTicker();
      }else{tryFeed()}
    }).catch(function(){tryFeed()});
  }
  tryFeed();
}
function updateTicker(){
  var el=document.getElementById("ticker-content");
  if(!el||!window._tickerItems)return;
  var items=window._tickerItems;
  var h="";
  for(var r=0;r<2;r++){
    items.forEach(function(item){
      var title=item.title;
      if(item.link){
        h+='<a href="'+item.link+'" target="_blank" class="ticker-item" onclick="event.stopPropagation()" style="text-decoration:none;color:var(--tx)"><div class="ticker-dot"></div><span>FLASH</span> '+title+'</a>';
      }else{
        h+='<div class="ticker-item"><div class="ticker-dot"></div><span>FLASH</span> '+title+'</div>';
      }
    });
  }
  el.innerHTML=h;
  var w=el.scrollWidth/2;
  el.style.animationDuration=Math.max(8,w/80)+"s";
}

// Load ticker after page renders
setTimeout(loadTicker,1000);
// Refresh ticker every 5 minutes
setInterval(function(){tickerLoaded=false;loadTicker()},300000);


function toggleTheme(){document.body.classList.toggle("light");localStorage.setItem("ff26_theme",document.body.classList.contains("light")?"light":"dark");render()}
// Restore theme
if(localStorage.getItem("ff26_theme")==="light")document.body.classList.add("light");

// Offline: cache data
try{localStorage.setItem("ff26_teams",JSON.stringify(TEAMS.map(function(t){return{id:t.id,name:t.name,group:t.group,rank:t.rank}})));
localStorage.setItem("ff26_version","2.0")}catch(e){}

render();
// Countdown: update only the timer digits, not the whole page
setInterval(function(){
  var el=document.getElementById("cd-timer");
  if(!el)return;
  var target=parseInt(el.dataset.target);
  if(!target)return;
  var diff=target-Date.now();
  if(diff<0){el.textContent="EN COURS";return}
  var d=Math.floor(diff/86400000);
  var h=Math.floor((diff%86400000)/3600000);
  var m=Math.floor((diff%3600000)/60000);
  var s=Math.floor((diff%60000)/1000);
  el.innerHTML='<div style="display:flex;justify-content:center;gap:8px">'
    +cdBox(d,"JOURS")+cdBox(h,"HEURES")+cdBox(m,"MIN")+cdBox(s,"SEC")+'</div>';
},1000);
function cdBox(v,l){return'<div style="background:var(--s2);border-radius:8px;padding:8px 6px;min-width:52px;text-align:center"><div style="font-size:22px;font-weight:900;color:var(--g)">'+v+'</div><div style="font-size:8px;color:var(--t2);font-weight:700">'+l+'</div></div>'}
</script>
