<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Foot Flash 2026</title>
  <meta name="theme-color" content="#060d1f">
  <link rel="canonical" href="app/src/main/assets/index.html">
  <script>
    // Redirige vers l'app avec un anti-cache basé sur la version (évite que le navigateur
    // serve un vieux index.html en cache). On lit version.json (no-store) puis on ajoute ?v=<version>.
    (function(){
      var base="app/src/main/assets/index.html";
      function go(v){
        var extra=location.search?("&"+location.search.slice(1)):"";
        location.replace(base+"?v="+encodeURIComponent(v)+extra+location.hash);
      }
      try{
        fetch("version.json?_="+Date.now(),{cache:"no-store"})
          .then(function(r){return r.json();})
          .then(function(j){ go((j&&j.version)||Date.now()); })
          .catch(function(){ go(Date.now()); });
      }catch(e){ go(Date.now()); }
    })();
  </script>
  <style>
    html,body{height:100%;margin:0}
    body{background:#060d1f;color:#e8c45c;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
         display:flex;align-items:center;justify-content:center;text-align:center}
    a{color:#e8c45c}
  </style>
</head>
<body>
  <div>
    <div style="font-size:15px;font-weight:800;letter-spacing:1px">⚽ FOOT FLASH 2026</div>
    <div style="font-size:12px;opacity:.8;margin-top:8px">Chargement…</div>
    <noscript><p><a href="app/src/main/assets/index.html">Ouvrir Foot Flash 2026</a></p></noscript>
  </div>
</body>
</html>
