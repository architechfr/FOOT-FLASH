<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#000000">
  <title>Sensible Soccer — Megadrive</title>
  <style>
    :root {
      --accent: #2f81f7;
      --pad-bg: rgba(255,255,255,0.10);
      --pad-bg-active: rgba(47,129,247,0.55);
      --pad-border: rgba(255,255,255,0.25);
      --text: #fff;
      --menu-bg: #161b22;
      --menu-border: #30363d;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body {
      height: 100%;
      width: 100%;
      background: #000;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }
    /* Zone de jeu plein écran */
    #game-area {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #game { width: 100%; height: 100%; }
    /* Conteneur des contrôles : full-screen overlay non bloquant */
    #controls {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    #controls > * { pointer-events: auto; }

    /* Bouton menu (haut droite) */
    .menu-btn {
      position: absolute;
      top: 14px; right: 14px;
      width: 44px; height: 44px;
      border-radius: 50%;
      background: rgba(0,0,0,0.45);
      border: 1px solid var(--pad-border);
      color: var(--text);
      font-size: 20px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    /* Joystick (bas gauche) */
    #joystick {
      position: absolute;
      bottom: 30px; left: 30px;
      width: 140px; height: 140px;
      border-radius: 50%;
      background: var(--pad-bg);
      border: 2px solid var(--pad-border);
      touch-action: none;
    }
    #joystick .stick {
      position: absolute;
      width: 60px; height: 60px;
      border-radius: 50%;
      background: rgba(255,255,255,0.85);
      border: 2px solid rgba(0,0,0,0.3);
      top: 40px; left: 40px;
      transition: background 0.1s;
    }
    #joystick.active .stick { background: var(--accent); }

    /* Boutons d'action (bas droite) en losange */
    #buttons {
      position: absolute;
      bottom: 30px; right: 30px;
      width: 200px; height: 180px;
    }
    .btn {
      position: absolute;
      width: 64px; height: 64px;
      border-radius: 50%;
      background: var(--pad-bg);
      border: 2px solid var(--pad-border);
      color: var(--text);
      font-size: 22px;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      transition: background 0.05s, transform 0.05s;
    }
    .btn.pressed {
      background: var(--pad-bg-active);
      transform: scale(0.94);
    }
    /* Disposition losange : A en bas, B à droite, C en haut */
    .btn[data-btn="A"] { left: 0;    bottom: 0; }
    .btn[data-btn="B"] { right: 0;   bottom: 50px; }
    .btn[data-btn="C"] { left: 50px; top: 0; }

    /* Start (centre bas) */
    .btn-start {
      position: absolute;
      bottom: 14px;
      left: 50%; transform: translateX(-50%);
      width: 80px; height: 36px;
      border-radius: 18px;
      background: rgba(0,0,0,0.45);
      border: 1px solid var(--pad-border);
      color: var(--text);
      font-size: 12px;
      letter-spacing: 1px;
      font-weight: 600;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    .btn-start.pressed { background: var(--pad-bg-active); }

    /* Menu modal */
    #menu-panel {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
    #menu-panel.open { display: flex; }
    .menu-card {
      background: var(--menu-bg);
      border: 1px solid var(--menu-border);
      border-radius: 14px;
      padding: 18px;
      min-width: 260px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .menu-card h2 {
      font-size: 14px;
      font-weight: 600;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }
    .menu-item {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--menu-border);
      color: var(--text);
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 15px;
      text-align: left;
      cursor: pointer;
    }
    .menu-item:hover, .menu-item:active {
      background: rgba(47,129,247,0.18);
      border-color: var(--accent);
    }
    .menu-item.danger { color: #f85149; }
    .menu-close {
      margin-top: 4px;
      background: transparent;
      border: none;
      color: #8b949e;
      padding: 8px;
      cursor: pointer;
      font-size: 13px;
    }

    /* Toast */
    #toast {
      position: fixed;
      top: 70px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.85);
      color: white;
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 13px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 200;
    }
    #toast.show { opacity: 1; }

    /* Loader */
    #status {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px;
      background: #000;
      z-index: 50;
      color: #8b949e; font-size: 14px;
    }
    #status.hidden { display: none; }

    /* Filet de sécurité : on masque tout pad virtuel d'EmulatorJS qui surgirait */
    .ejs_virtualGamepad,
    .ejs_virtualGamepad_button,
    [class*="virtualGamepad"],
    [class*="VirtualGamepad"] {
      display: none !important;
      visibility: hidden !important;
      pointer-events: none !important;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 2px solid #30363d;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Conseil orientation portrait */
    #rotate-hint {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.85);
      display: none;
      align-items: center; justify-content: center;
      flex-direction: column;
      gap: 14px;
      z-index: 150;
      color: white;
      text-align: center;
      padding: 30px;
    }
    @media (orientation: portrait) and (max-width: 600px) {
      #rotate-hint { display: flex; }
    }
    .phone-icon {
      width: 60px; height: 100px;
      border: 3px solid white;
      border-radius: 8px;
      animation: rotate 2s ease-in-out infinite;
    }
    @keyframes rotate {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(-90deg); }
    }
  </style>
</head>
<body>

<div id="game-area"><div id="game"></div></div>

<div id="status">
  <div class="spinner"></div>
  <div id="status-text">Chargement de l'émulateur…</div>
</div>

<div id="controls">
  <button class="menu-btn" id="menu-open" aria-label="Menu">⋮</button>

  <div id="joystick">
    <div class="stick"></div>
  </div>

  <div id="buttons">
    <div class="btn" data-btn="C" data-key="d" data-pad="8" data-label="C">C</div>
    <div class="btn" data-btn="B" data-key="s" data-pad="1" data-label="B">B</div>
    <div class="btn" data-btn="A" data-key="x" data-pad="0" data-label="A">A</div>
  </div>

  <div class="btn-start" data-key="enter" data-pad="3" data-label="START">START</div>
</div>

<div id="menu-panel">
  <div class="menu-card">
    <h2>Menu</h2>
    <button class="menu-item" data-action="resume">▶ Reprendre</button>
    <button class="menu-item" data-action="save">💾 Sauvegarder l'état</button>
    <button class="menu-item" data-action="load">↩ Charger l'état</button>
    <button class="menu-item" data-action="fullscreen">⛶ Plein écran</button>
    <button class="menu-item" data-action="mute">🔊 Son on/off</button>
    <button class="menu-item danger" data-action="reset">⟲ Redémarrer la partie</button>
    <button class="menu-close" data-action="resume">Fermer</button>
  </div>
</div>

<div id="rotate-hint">
  <div class="phone-icon"></div>
  <div>Tourne ton téléphone en mode paysage pour mieux jouer</div>
  <button class="menu-item" onclick="document.getElementById('rotate-hint').style.display='none'">
    Continuer en portrait
  </button>
</div>

<div id="toast"></div>

  function b64ToBlobUrl(b64) {
    const bin = atob(b64);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    return URL.createObjectURL(new Blob([bytes], { type: 'application/octet-stream' }));
  }

    gamepad: false, virtualGamepad: false, cheat: false, volume: false,
    saveSavFiles: false, loadSavFiles: false,
    cacheManager: false, exitEmulation: false,
    contextMenu: false, netplay: false
  };

  // Mapping clavier explicite — Megadrive, Player 1
  // RetroPad indices : 0=B, 1=Y, 2=Select, 3=Start, 4-7=DPad, 8=A, 9=X
  // Genesis Plus GX  : RetroPad B=MD A, RetroPad A=MD B, RetroPad X=MD C
  window.EJS_defaultControls = {
    0: {
      0: { value: 'x',          value2: 'BUTTON_2' },        // MD A (passe)
      1: { value: 's',          value2: 'BUTTON_4' },        // MD B (tir)
      2: { value: 'shift',      value2: 'SELECT' },
      3: { value: 'enter',      value2: 'START' },           // Start
      4: { value: 'arrowup',    value2: 'DPAD_UP' },
      5: { value: 'arrowdown',  value2: 'DPAD_DOWN' },
      6: { value: 'arrowleft',  value2: 'DPAD_LEFT' },
      7: { value: 'arrowright', value2: 'DPAD_RIGHT' },
      8: { value: 'd',          value2: 'BUTTON_1' },        // MD C (centre/aftertouch)
      9: { value: 'q',          value2: 'BUTTON_3' }         // (libre, mode 6-boutons)
    },
    1: {}, 2: {}, 3: {}
  };

  window.EJS_ready = function () {
    document.getElementById('status').classList.add('hidden');
  };

  // ============================================================
  // Helpers : envoi d'inputs à l'émulateur
  // 1) Voie principale : EJS_emulator.gameManager.simulateInput(player, retroIdx, value)
  // 2) Fallback clavier : KeyboardEvent avec keyCode patché (sinon ignoré par EJS)
  // ============================================================
  const KEY_CODES = {
    'arrowup':    { code: 'ArrowUp',    keyCode: 38 },
    'arrowdown':  { code: 'ArrowDown',  keyCode: 40 },
    'arrowleft':  { code: 'ArrowLeft',  keyCode: 37 },
    'arrowright': { code: 'ArrowRight', keyCode: 39 },
    'x':          { code: 'KeyX',       keyCode: 88 },
    's':          { code: 'KeyS',       keyCode: 83 },
    'd':          { code: 'KeyD',       keyCode: 68 },
    'enter':      { code: 'Enter',      keyCode: 13 }
  };

  // Indicateur de debug (no-op : overlay retiré pour la version finale)
  function debugFlash() { /* disabled */ }

  // Voie 1 : appel direct à EmulatorJS
  function simInput(retroIdx, value) {
    const emu = window.EJS_emulator;
    if (!emu) return false;
    const gm = emu.gameManager;
    if (gm && typeof gm.simulateInput === 'function') {
      try { gm.simulateInput(0, retroIdx, value); return true; }
      catch (e) { console.warn('simulateInput error', e); }
    }
    return false;
  }

  // Voie 2 : fallback clavier (avec patch keyCode/which)
  function dispatchKey(type, keyName) {
    const k = KEY_CODES[keyName];
    if (!k) return;
    const ev = new KeyboardEvent(type, {
      key: keyName,
      code: k.code,
      bubbles: true,
      cancelable: true
    });
    // keyCode/which sont read-only sur les events synthétiques → on les redéfinit
    try {
      Object.defineProperty(ev, 'keyCode', { get: () => k.keyCode });
      Object.defineProperty(ev, 'which',   { get: () => k.keyCode });
    } catch (e) { /* ignore */ }
    document.dispatchEvent(ev);
    window.dispatchEvent(ev);
  }
  function pressKey(keyName)   { dispatchKey('keydown', keyName); }
  function releaseKey(keyName) { dispatchKey('keyup',   keyName); }

  // Combo : API directe sinon clavier
  function sendInput(retroIdx, key, on, label) {
    const ok = simInput(retroIdx, on ? 1 : 0);
    if (!ok) { on ? pressKey(key) : releaseKey(key); }
    debugFlash((on ? '▼ ' : '△ ') + label + ' [' + (ok ? 'API' : 'KBD') + ']');
  }

  // ============================================================
  // Boutons d'action (A / B / C / Start)
  // ============================================================
  function bindActionButton(el) {
    const key    = el.dataset.key;
    const padIdx = parseInt(el.dataset.pad, 10);
    const label  = el.dataset.label || key;
    let active = false;
    const press = (e) => {
      e.preventDefault();
      if (active) return;
      active = true;
      el.classList.add('pressed');
      sendInput(padIdx, key, true, label);
    };
    const release = (e) => {
      if (!active) return;
      active = false;
      el.classList.remove('pressed');
      sendInput(padIdx, key, false, label);
    };
    el.addEventListener('touchstart',  press,   { passive: false });
    el.addEventListener('touchend',    release, { passive: false });
    el.addEventListener('touchcancel', release, { passive: false });
    // Souris (test desktop)
    el.addEventListener('mousedown',  press);
    el.addEventListener('mouseup',    release);
    el.addEventListener('mouseleave', release);
  }
  document.querySelectorAll('.btn, .btn-start').forEach(bindActionButton);

  // ============================================================
  // Joystick virtuel → 8 directions du D-pad
  // ============================================================
  (function setupJoystick() {
    const joystick = document.getElementById('joystick');
    const stick    = joystick.querySelector('.stick');
    const radius   = 70;            // rayon de la zone
    const stickR   = 30;            // moitié de la taille du stick
    const dead     = 18;            // zone morte (px)
    let activeId   = null;
    const state    = { up:0, down:0, left:0, right:0 };

    // Mapping joystick → RetroPad : up=4, down=5, left=6, right=7
    const PAD_DIR = { up: 4, down: 5, left: 6, right: 7 };
    const KEY_DIR = { up: 'arrowup', down: 'arrowdown', left: 'arrowleft', right: 'arrowright' };

    function setDir(name, on) {
      if (state[name] === (on ? 1 : 0)) return;
      state[name] = on ? 1 : 0;
      sendInput(PAD_DIR[name], KEY_DIR[name], !!on, name.toUpperCase());
    }

    function updateFromOffset(dx, dy) {
      const dist = Math.hypot(dx, dy);
      // Limiter le stick au cercle
      let ldx = dx, ldy = dy;
      if (dist > radius - stickR) {
        const k = (radius - stickR) / dist;
        ldx = dx * k;
        ldy = dy * k;
      }
      stick.style.transform = `translate(${ldx}px, ${ldy}px)`;

      if (dist < dead) {
        setDir('up', false); setDir('down', false);
        setDir('left', false); setDir('right', false);
        return;
      }
      // Angle en degrés (-180..180), 0 = droite, 90 = bas
      const ang = Math.atan2(dy, dx) * 180 / Math.PI;
      // 8 directions : tolérance 67.5° de chaque côté
      setDir('right', ang > -67.5 && ang <  67.5);
      setDir('down',  ang >  22.5 && ang < 157.5);
      setDir('left',  ang >  112.5 || ang < -112.5);
      setDir('up',    ang < -22.5 && ang > -157.5);
    }

    function reset() {
      stick.style.transform = '';
      joystick.classList.remove('active');
      setDir('up', false); setDir('down', false);
      setDir('left', false); setDir('right', false);
      activeId = null;
    }

    function onStart(e) {
      e.preventDefault();
      const t = e.changedTouches ? e.changedTouches[0] : e;
      activeId = e.changedTouches ? t.identifier : 'mouse';
      joystick.classList.add('active');
      const r = joystick.getBoundingClientRect();
      const cx = r.left + r.width / 2;
      const cy = r.top  + r.height / 2;
      updateFromOffset(t.clientX - cx, t.clientY - cy);
    }
    function onMove(e) {
      if (activeId === null) return;
      e.preventDefault();
      let t;
      if (e.changedTouches) {
        for (let i = 0; i < e.changedTouches.length; i++) {
          if (e.changedTouches[i].identifier === activeId) { t = e.changedTouches[i]; break; }
        }
        if (!t) return;
      } else {
        t = e;
      }
      const r = joystick.getBoundingClientRect();
      const cx = r.left + r.width / 2;
      const cy = r.top  + r.height / 2;
      updateFromOffset(t.clientX - cx, t.clientY - cy);
    }
    function onEnd(e) {
      if (activeId === null) return;
      if (e.changedTouches) {
        let found = false;
        for (let i = 0; i < e.changedTouches.length; i++) {
          if (e.changedTouches[i].identifier === activeId) { found = true; break; }
        }
        if (!found) return;
      }
      e.preventDefault();
      reset();
    }

    joystick.addEventListener('touchstart',  onStart, { passive: false });
    document.addEventListener('touchmove',   onMove,  { passive: false });
    document.addEventListener('touchend',    onEnd,   { passive: false });
    document.addEventListener('touchcancel', onEnd,   { passive: false });
    // Desktop
    joystick.addEventListener('mousedown', onStart);
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup',   onEnd);
  })();

  // ============================================================
  // Menu
  // ============================================================
  const menuPanel = document.getElementById('menu-panel');
  const toast     = document.getElementById('toast');
  let toastTimer  = null;
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 1500);
  }

  document.getElementById('menu-open').addEventListener('click', () => {
    menuPanel.classList.add('open');
  });

  menuPanel.addEventListener('click', (e) => {
    if (e.target === menuPanel) menuPanel.classList.remove('open');
  });

  function tryCall(obj, methods) {
    for (const m of methods) {
      try {
        if (obj && typeof obj[m] === 'function') { obj[m](); return true; }
      } catch (err) { /* ignore */ }
    }
    return false;
  }

  document.querySelectorAll('[data-action]').forEach(btn => {
    btn.addEventListener('click', () => {
      const action = btn.dataset.action;
      const emu = window.EJS_emulator;
      const gm  = emu && emu.gameManager;

      if (action === 'resume') {
        menuPanel.classList.remove('open');
      }
      else if (action === 'save') {
        if (gm) {
          try {
            const saved = gm.getState();
            // EmulatorJS stocke en base64 dans localStorage
            localStorage.setItem('sensible_state', btoa(String.fromCharCode.apply(null, new Uint8Array(saved))));
            showToast('État sauvegardé');
          } catch (e) {
            // Fallback : quickSave si dispo
            if (tryCall(gm, ['quickSave'])) showToast('État sauvegardé');
            else showToast('Sauvegarde indisponible');
          }
        }
        menuPanel.classList.remove('open');
      }
      else if (action === 'load') {
        if (gm) {
          try {
            const stored = localStorage.getItem('sensible_state');
            if (stored) {
              const bin = atob(stored);
              const bytes = new Uint8Array(bin.length);
              for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
              gm.loadState(bytes);
              showToast('État chargé');
            } else if (tryCall(gm, ['quickLoad'])) {
              showToast('État chargé');
            } else {
              showToast('Aucun état sauvegardé');
            }
          } catch (e) {
            if (tryCall(gm, ['quickLoad'])) showToast('État chargé');
            else showToast('Chargement échoué');
          }
        }
        menuPanel.classList.remove('open');
      }
      else if (action === 'reset') {
        if (gm) tryCall(gm, ['restart', 'reset']);
        showToast('Partie réinitialisée');
        menuPanel.classList.remove('open');
      }
      else if (action === 'fullscreen') {
        const el = document.documentElement;
        if (!document.fullscreenElement) {
          (el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen)?.call(el);
        } else {
          (document.exitFullscreen || document.webkitExitFullscreen)?.call(document);
        }
        menuPanel.classList.remove('open');
      }
      else if (action === 'mute') {
        if (emu) {
          try {
            if (typeof emu.toggleMute === 'function') emu.toggleMute();
            else if (gm && gm.functions && gm.functions.setMute) {
              const cur = !!emu.muted;
              gm.functions.setMute(!cur);
              emu.muted = !cur;
            } else if (gm && typeof gm.mute === 'function') gm.mute(!emu.muted);
            showToast(emu.muted ? 'Son coupé' : 'Son activé');
          } catch (e) { showToast('Volume indisponible'); }
        }
        menuPanel.classList.remove('open');
      }
    });
  });

  // ============================================================
  // Empêcher zoom / scroll involontaires
  // ============================================================
  document.addEventListener('gesturestart', e => e.preventDefault());
  document.addEventListener('dblclick',     e => e.preventDefault());
</script>
<script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>

</body>
</html>
