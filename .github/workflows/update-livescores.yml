name: Update livescores

# Scores du Mondial via football-data.org → app/src/main/assets/data/livescores.json
# La clé reste un secret du dépôt (FOOTBALLDATA_KEY). 1 requête par exécution.

on:
  push:
    branches: [ main ]        # se lance à chaque push (utile pour le 1er test/enregistrement)
  schedule:
    - cron: "*/3 * * * *"     # toutes les 3 min ; commit seulement si un score change
  workflow_dispatch:          # bouton "Run workflow" (test/vérif manuelle)

permissions:
  contents: write

concurrency:
  group: update-livescores
  cancel-in-progress: true

jobs:
  livescores:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # Le cron GitHub "*/3" est fortement throttlé (trous observés > 3 h).
      # Parade : chaque run BOUCLE ~5 h 50 en re-fetchant toutes les ~3 min,
      # et commit/push à chaque changement. Le groupe concurrency fait la
      # rotation (un nouveau run annule l'ancien). Repo public = minutes illimitées.
      - name: Boucle scores (~5 h 50, fetch toutes les ~3 min)
        env:
          FOOTBALLDATA_KEY: ${{ secrets.FOOTBALLDATA_KEY }}
          COMP: "WC"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for i in $(seq 1 118); do
            echo "── Itération $i/118 ──"
            node scripts/fetch-livescores.mjs || true
            if ! git diff --quiet -- app/src/main/assets/data/ || [ -n "$(git status --porcelain app/src/main/assets/data/)" ]; then
              git add app/src/main/assets/data/livescores.json app/src/main/assets/data/schedule-fd.json
              git commit -m "Auto: scores Mondial (livescores.json)" || true
              git pull --rebase origin main || true
              git push || echo "⚠️ push KO (retry au tour suivant)"
            else
              echo "Aucun changement de score."
            fi
            [ "$i" -lt 118 ] && sleep 175
          done
