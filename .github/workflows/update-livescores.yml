name: Update livescores

# Scores du Mondial via football-data.org → app/src/main/assets/data/livescores.json
# La clé reste un secret du dépôt (FOOTBALLDATA_KEY). 1 requête par exécution.

on:
  push:
    branches: [ main ]        # se lance à chaque push (utile pour le 1er test/enregistrement)
  schedule:
    - cron: "*/3 * * * *"     # toutes les 3 min ; commit seulement si un score change
  workflow_dispatch:          # bouton "Run workflow" (test/vérif manuelle)

permissions:
  contents: write
  actions: write   # auto-réenclenchement (workflow_dispatch sur soi-même)

concurrency:
  group: update-livescores
  cancel-in-progress: true

jobs:
  livescores:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # Le cron GitHub "*/3" est fortement throttlé (constaté : AUCUN run schedule
      # pendant la nuit du 11 au 12/06 → KOR-CZE raté). Parade en deux temps :
      # 1. chaque run BOUCLE ~5 h 30 en re-fetchant toutes les ~3 min ;
      # 2. à la fin, le run SE RÉENCLENCHE lui-même (workflow_dispatch, autorisé
      #    avec le GITHUB_TOKEN) → chaîne perpétuelle, indépendante du cron.
      # Le groupe concurrency fait la rotation. Repo public = minutes illimitées.
      - name: Boucle scores (~5 h 30, fetch toutes les ~3 min)
        env:
          FOOTBALLDATA_KEY: ${{ secrets.FOOTBALLDATA_KEY }}
          APIFOOTBALL_KEY: ${{ secrets.APIFOOTBALL_KEY }}
          COMP: "WC"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for i in $(seq 1 110); do
            echo "── Itération $i/110 ──"
            node scripts/fetch-livescores.mjs || true
            node scripts/fetch-lineups.mjs || true
            if ! git diff --quiet -- app/src/main/assets/data/ || [ -n "$(git status --porcelain app/src/main/assets/data/)" ]; then
              git add app/src/main/assets/data/livescores.json app/src/main/assets/data/schedule-fd.json app/src/main/assets/data/lineups.json
              git commit -m "Auto: scores Mondial (livescores.json)" || true
              git pull --rebase origin main || true
              git push || echo "⚠️ push KO (retry au tour suivant)"
            else
              echo "Aucun changement de score."
            fi
            [ "$i" -lt 110 ] && sleep 175
          done
      - name: Réenclenchement (chaîne perpétuelle)
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run update-livescores.yml --ref main || echo "dispatch KO (le cron prendra le relais)"
